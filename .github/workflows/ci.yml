name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:all
      - run: npm run bench
      - name: Official Claude Code plugin validation
        run: |
          npm install --global @anthropic-ai/claude-code@2.1.206
          claude plugin validate . --strict
